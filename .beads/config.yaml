# Beads Configuration File
# This file configures default behavior for all bd commands in this repository
# All settings can also be set via environment variables (BD_* prefix)
# or overridden with command-line flags

# Issue prefix for this repository (used by bd init)
issue-prefix: "ohi"

# Use no-db mode: JSONL-only, no Dolt database
# no-db: false

# Dolt shared-server mode: all projects share one Dolt sql-server
# instance at ~/.beads/shared-server/dolt, each in its own database.
dolt.shared-server: true

# Git remote used for bootstrapping / syncing the Dolt database.
sync.remote: "git@github.com:Toady00/opencode-hindsight.git"

# Disable automatic JSONL exports.
export.auto: false

# Routing: stay in the local repo (disable contributor auto-route to ~/.beads-planning)
# so list/search commands read this project's own database.
routing.mode: "maintainer"
